<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Dr B's Oro-Hold Dental Lab</title>
  <link rel="stylesheet" href="styles.css?v=16">
  <link rel="icon" type="image/png" href="dr logo.png">
  <style>
    body {
      background-color: var(--dark);
      color: #f5f5f7;
      font-family: var(--font-body);
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background-image: url('data:image/svg+xml,%3Csvg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"%3E%3Cg fill="none" fill-rule="evenodd"%3E%3Cg fill="%23c6a265" fill-opacity="0.05"%3E%3Cpath d="M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z"/%3E%3C/g%3E%3C/g%3E%3C/svg%3E');
    }
    .login-container {
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(198, 162, 101, 0.2);
      border-radius: 20px;
      padding: 50px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .login-logo {
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
      object-fit: contain;
    }
    h2 {
      color: var(--gold);
      margin-bottom: 8px;
      font-size: 24px;
    }
    p {
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      margin-bottom: 30px;
    }
    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 8px;
    }
    .form-group input {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.03);
      color: white;
      font-size: 15px;
      outline: none;
      transition: all 0.3s;
      box-sizing: border-box;
    }
    .form-group input:focus {
      border-color: var(--gold);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 3px rgba(198, 162, 101, 0.2);
    }
    .login-btn {
      width: 100%;
      padding: 14px;
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }
    .login-btn:hover {
      background: #dfb97a;
      transform: translateY(-2px);
    }
    .error-msg {
      color: #ff4d4f;
      font-size: 13px;
      margin-top: 15px;
      display: none;
    }
    .back-btn {
      display: inline-block;
      margin-top: 20px;
      color: rgba(255, 255, 255, 0.5);
      text-decoration: none;
      font-size: 13px;
      transition: color 0.3s;
    }
    .back-btn:hover {
      color: var(--gold);
    }
  </style>
</head>
<body>

  <div class="login-container">
    <img src="dr logo.png" alt="Logo" class="login-logo">
    <h2>Dentist Portal Login</h2>
    <p>Sign in to access your laboratory dashboard</p>

    <form id="loginForm">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Enter username" required autocomplete="off">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password" required autocomplete="off">
      </div>
      <button type="submit" class="login-btn">Login to Portal</button>
      <div class="error-msg" id="errorMsg">Invalid username or password. Please try again.</div>
    </form>
    
    <a href="index.html" class="back-btn">&larr; Back to Website</a>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;

      if (user === 'OroHold.' && pass === 'OroHold.') {
        window.location.href = 'admin.html';
      } else {
        document.getElementById('errorMsg').style.display = 'block';
        setTimeout(() => {
          document.getElementById('errorMsg').style.display = 'none';
        }, 3000);
      }
    });
  </script>
</body>
</html>
